version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  request-service:
    image: python:3.12-slim
    command: python -m http.server 8001
    ports:
      - "8001:8001"

  group-service:
    image: python:3.12-slim
    command: python -m http.server 8002
    ports:
      - "8002:8002"

  notification-service:
    image: python:3.12-slim
    command: python -m http.server 8003
    ports:
      - "8003:8003"
