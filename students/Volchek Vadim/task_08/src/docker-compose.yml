version: "3.8"

services:
  request-service:
    build: ./services/request-service
    container_name: request-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://user:password@requests-db:5432/bugs
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
    depends_on:
      - requests-db
      - rabbitmq
    networks:
      - bugtracker-network

  group-service:
    build: ./services/group-service
    container_name: group-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://user:password@groups-db:5432/teams
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
    depends_on:
      - groups-db
      - rabbitmq
    networks:
      - bugtracker-network

  requests-db:
    image: postgres:15-alpine
    container_name: requests-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bugs
    volumes:
      - requests-data:/var/lib/postgresql/data
    networks:
      - bugtracker-network

  groups-db:
    image: postgres:15-alpine
    container_name: groups-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: teams
    volumes:
      - groups-data:/var/lib/postgresql/data
    networks:
      - bugtracker-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - bugtracker-network

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - request-service
      - group-service
    networks:
      - bugtracker-network

volumes:
  requests-data:
  groups-data:

networks:
  bugtracker-network:
    driver: bridge
